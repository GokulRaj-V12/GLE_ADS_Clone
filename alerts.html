<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manager Alerts — LSA Audit Tool</title>
  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="stylesheet" href="css/sidebar.css"/>
</head>
<body>
  <div id="spinner-overlay">
    <svg class="spinner-svg" viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="12" r="10" stroke="#DADCE0" stroke-width="3"/>
      <path d="M12 2a10 10 0 0 1 10 10" stroke="#1A73E8" stroke-width="3" stroke-linecap="round"/>
    </svg>
  </div>
  <header class="app-header">
    <div class="header-left">
      <button class="icon-btn" id="sidebar-hamburger" aria-label="Toggle sidebar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <span class="header-title">Manager Alerts</span>
    </div>
    <div class="header-right">
      <div class="icon-btn bell-wrapper">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span class="bell-badge"></span>
      </div>
      <div class="avatar-circle">I</div>
    </div>
  </header>
  <div class="app-layout">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="main-content" id="main-content">
      <div class="placeholder-container">
        <div class="placeholder-icon">🚧</div>
        <h2>Manager Alerts</h2>
        <p>This section is under development and will be available soon.</p>
        <p>Use the sidebar to navigate to an active section.</p>
      </div>
    </main>
  </div>
  <script src="js/spinner.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/data-loader.js"></script>
  <script src="js/sidebar.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      requireAuth();
      renderSidebar('manager-alerts');
    });
    document.getElementById('sidebar-hamburger').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('collapsed');
      document.getElementById('main-content').classList.toggle('sidebar-collapsed');
    });
  </script>
</body>
</html>
