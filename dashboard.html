<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MCC Reports — LSA Audit Tool</title>
  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="stylesheet" href="css/sidebar.css"/>
  <link rel="stylesheet" href="css/dashboard.css"/>
</head>
<body>
  <div id="spinner-overlay">
    <svg class="spinner-svg" viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="12" r="10" stroke="#DADCE0" stroke-width="3"/>
      <path d="M12 2a10 10 0 0 1 10 10" stroke="#1A73E8" stroke-width="3" stroke-linecap="round"/>
    </svg>
  </div>

  <!-- Header -->
  <header class="app-header">
    <div class="header-left">
      <button class="icon-btn" id="sidebar-hamburger" aria-label="Toggle sidebar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <span class="header-title">MCC Reports</span>
    </div>
    <div class="header-right">
      <div class="icon-btn bell-wrapper" title="Alerts">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span class="bell-badge"></span>
      </div>
      <div class="icon-btn" title="Apps">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="5" cy="5" r="1.5"/><circle cx="12" cy="5" r="1.5"/><circle cx="19" cy="5" r="1.5"/>
          <circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/>
          <circle cx="5" cy="19" r="1.5"/><circle cx="12" cy="19" r="1.5"/><circle cx="19" cy="19" r="1.5"/>
        </svg>
      </div>
      <div class="avatar-circle" title="Profile">I</div>
    </div>
  </header>

  <div class="app-layout">
    <nav class="sidebar" id="sidebar"></nav>

    <main class="main-content" id="main-content">
      <!-- Toolbar -->
      <div class="toolbar">
        <div class="toolbar-left">
          <select id="category-filter" aria-label="Search by category">
            <option value="">Search by</option>
          </select>
          <input id="search-input" type="text" placeholder="Search accounts..." aria-label="Search accounts" style="min-width:180px"/>
          <button class="toolbar-reset" id="reset-btn">RESET</button>
        </div>
        <div class="toolbar-right">
          <div class="date-range-picker" data-testid="date-range-picker">
            <span>Feb 1, 2026 – Feb 28, 2026</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </div>
        </div>
      </div>

      <!-- Table -->
      <div class="table-section">
        <div class="table-header-bar">
          <span class="section-label">Live Accounts</span>
          <div class="table-actions">
            <div class="table-icon-btn" title="Add account">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </div>
            <div class="table-icon-btn" title="Download">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </div>
          </div>
        </div>
        <table class="accounts-table" data-testid="account-table">
          <thead>
            <tr>
              <th>Account name / ID</th>
              <th>Category</th>
              <th>Weekly budget</th>
              <th>Bids</th>
              <th>Reviews score / # of reviews</th>
              <th class="metric">Lead charged<br/><small>(vs previous period)</small></th>
              <th class="metric">Calls<br/><small>(vs previous period)</small></th>
              <th class="metric">Connected calls<br/><small>(vs previous period)</small></th>
              <th class="metric">Cost<br/><small>(vs previous period)</small></th>
            </tr>
          </thead>
          <tbody id="accounts-tbody"></tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="js/spinner.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/data-loader.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/dashboard.js"></script>
  <script>
    document.getElementById('sidebar-hamburger').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('collapsed');
      document.getElementById('main-content').classList.toggle('sidebar-collapsed');
    });
  </script>
</body>
</html>
