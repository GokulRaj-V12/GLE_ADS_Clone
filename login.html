<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LSA Audit Tool — Sign In</title>
  <meta name="description" content="Sign in to the LSA Audit Tool for Google Local Services Ads management."/>
  <link rel="stylesheet" href="css/styles.css"/>
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg-page); }
    .login-card {
      background: var(--white); border: 1px solid var(--border-color);
      border-radius: 8px; padding: 40px 40px 32px;
      width: 100%; max-width: 400px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
    }
    .login-logo { text-align:center; margin-bottom:28px; }
    .login-logo-text {
      font-size: 22px; font-weight: 700; color: var(--primary-blue);
      letter-spacing: -0.5px;
    }
    .login-logo-sub { font-size: 12px; color: var(--secondary-text); margin-top: 4px; }
    .login-field { margin-bottom: 18px; }
    .login-field label { display:block; font-size:12px; font-weight:500; color:var(--secondary-text); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.4px; }
    .login-field input {
      width:100%; height:44px; padding:0 14px;
      border:1px solid var(--border-color); border-radius:var(--radius);
      font-size:14px; color:var(--dark-text); outline:none;
      transition: border-color 0.2s;
    }
    .login-field input:focus { border-color: var(--primary-blue); box-shadow: 0 0 0 3px rgba(26,115,232,0.12); }
    .login-error { color:var(--status-red); font-size:13px; margin-bottom:14px; display:none; }
    .login-submit {
      width:100%; height:44px; background:var(--primary-blue);
      color:white; border:none; border-radius:var(--radius);
      font-size:14px; font-weight:500; cursor:pointer;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .login-submit:hover { background:#1557b0; box-shadow:0 2px 8px rgba(26,115,232,0.35); }
    .login-footer { text-align:center; margin-top:20px; font-size:12px; color:var(--secondary-text); }
  </style>
</head>
<body>
  <div id="spinner-overlay">
    <svg class="spinner-svg" viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="12" r="10" stroke="#DADCE0" stroke-width="3"/>
      <path d="M12 2a10 10 0 0 1 10 10" stroke="#1A73E8" stroke-width="3" stroke-linecap="round"/>
    </svg>
  </div>

  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-text">🔍 LSA Audit Tool</div>
      <div class="login-logo-sub">Google Local Services Ads — Sandbox</div>
    </div>
    <form id="login-form">
      <div class="login-field">
        <label for="username">Username</label>
        <input id="username" type="text" data-testid="login-username" placeholder="Enter username" autocomplete="username" required/>
      </div>
      <div class="login-field">
        <label for="password">Password</label>
        <input id="password" type="password" data-testid="login-password" placeholder="Enter password" autocomplete="current-password" required/>
      </div>
      <div class="login-error" data-testid="login-error"></div>
      <button type="submit" class="login-submit" data-testid="login-submit">Sign in</button>
    </form>
    <div class="login-footer">Demo credentials: admin / password123</div>
  </div>

  <script src="js/spinner.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
