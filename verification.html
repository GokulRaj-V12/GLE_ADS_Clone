<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Business Verification — LSA Audit Tool</title>
  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="stylesheet" href="css/sidebar.css"/>
  <link rel="stylesheet" href="css/verification.css"/>
</head>
<body>
  <div id="spinner-overlay">
    <svg class="spinner-svg" viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="12" r="10" stroke="#DADCE0" stroke-width="3"/>
      <path d="M12 2a10 10 0 0 1 10 10" stroke="#1A73E8" stroke-width="3" stroke-linecap="round"/>
    </svg>
  </div>

  <header class="app-header">
    <div class="header-left">
      <button class="icon-btn" id="sidebar-hamburger" aria-label="Toggle sidebar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <span class="header-title">Business Verification</span>
    </div>
    <div class="header-right">
      <div class="icon-btn bell-wrapper">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span class="bell-badge"></span>
      </div>
      <div class="icon-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="5" cy="5" r="1.5"/><circle cx="12" cy="5" r="1.5"/><circle cx="19" cy="5" r="1.5"/>
          <circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/>
          <circle cx="5" cy="19" r="1.5"/><circle cx="12" cy="19" r="1.5"/><circle cx="19" cy="19" r="1.5"/>
        </svg>
      </div>
      <div class="avatar-circle">I</div>
    </div>
  </header>

  <div class="app-layout">
    <nav class="sidebar" id="sidebar"></nav>

    <main class="main-content" id="main-content">
      <!-- Sub-header -->
      <div class="profile-subheader" style="padding:8px 24px 12px; border-bottom:1px solid var(--border-color); background:var(--white);">
        <div style="display:flex;align-items:center;gap:6px;font-size:15px;font-weight:500;color:var(--dark-text);">
          <span id="account-name-display">Loading...</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div style="font-size:12px;color:var(--secondary-text);margin-top:2px" id="customer-id-display"></div>
      </div>

      <!-- Verification 2-col layout -->
      <div class="verification-layout">
        <!-- Left column -->
        <div class="checklist-column">
          <div id="verification-checklist" data-testid="verification-checklist"></div>
          <!-- Support footer -->
          <div class="checklist-footer">
            <p>Need help from our experts?</p>
            <div class="support-item">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.6 3.41 2 2 0 0 1 3.59 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.56a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
              </svg>
              +1 844-263-9884
            </div>
            <div class="support-item">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
              Email us
            </div>
            <div class="support-hours">9:00AM – 9:00PM EDT, Monday – Friday</div>
          </div>
        </div>

        <!-- Right column -->
        <div class="detail-panel" id="detail-panel" data-testid="detail-panel">
          <div class="detail-default">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="12" cy="12" r="10"/>
              <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
              <line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
            <p>Select a verification item on the left to view details.</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/spinner.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/data-loader.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/verification.js"></script>
  <script>
    document.getElementById('sidebar-hamburger').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('collapsed');
      document.getElementById('main-content').classList.toggle('sidebar-collapsed');
    });
  </script>
</body>
</html>
